behaviors:
  NiryoReach:
    trainer_type: ppo
    hyperparameters:
      batch_size: 256
      buffer_size: 4096
      learning_rate: 5.0e-5
      beta: 0.002
      epsilon: 0.12
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 1200000
    time_horizon: 128
    summary_freq: 10000
    checkpoint_interval: 50000
    keep_checkpoints: 8
    threaded: true