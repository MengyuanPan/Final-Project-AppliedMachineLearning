behaviors:
  NiryoReach:                      # must match Behavior Name in Unity
    trainer_type: ppo

    hyperparameters:
      batch_size: 512              # small batch = faster early updates
      buffer_size: 10240           # 20x batch size
      learning_rate: 3.0e-4
      beta: 5.0e-3                 # entropy bonus - keeps exploration alive
      epsilon: 0.2                 # PPO clip range
      lambd: 0.95                  # GAE lambda
      num_epoch: 5                 # passes over buffer per update
      learning_rate_schedule: linear

    network_settings:
      normalize: true              # normalises the 20-dimensional observation vector for stable learning
      hidden_units: 128            # suitable for a reaching task with 20 observations and 6 continuous actions
      num_layers: 2

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    max_steps: 500000              # ~500k steps; should converge well before this
    time_horizon: 64               # short horizon - reaching is a short-horizon task
    checkpoint_interval: 50000
    keep_checkpoints: 5
    summary_freq: 2000             # TensorBoard update every 2000 steps